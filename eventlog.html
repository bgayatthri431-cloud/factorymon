<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FactoryMon — Event Log</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="index.html">
    <span class="icon">🏭</span> FACTORYMON
  </a>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="simulate.html">Simulate</a>
    <a href="eventlog.html" class="active">Event Log</a>
  </div>
  <div class="nav-status">
    <div class="pulse"></div>
    <span>LIVE</span>
  </div>
</nav>

<!-- PAGE -->
<div class="page">

  <!-- Header -->
  <div class="page-header">
    <div>
      <div class="page-title">Event Log</div>
      <div class="page-sub">Complete history of all machine temperature readings and fault events</div>
    </div>
    <button class="btn-primary" onclick="loadEvents()">↻ Refresh</button>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Line</span>
      <select id="filter-line">
        <option value="">All Lines</option>
        <option value="A">Line A</option>
        <option value="B">Line B</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <select id="filter-status">
        <option value="">All Status</option>
        <option value="normal">Normal</option>
        <option value="warning">Warning</option>
        <option value="critical">Critical</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Rows</span>
      <select id="filter-limit">
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </div>
    <button class="btn-primary" onclick="loadEvents()">Apply Filters</button>
    <span id="event-count" style="margin-left:auto; font-size:0.78rem; color:var(--text2);"></span>
  </div>

  <!-- Table -->
  <div class="section-card">
    <div class="section-head">
      <span class="section-title">All Events</span>
      <span class="section-badge" id="table-badge">LOADING...</span>
    </div>
    <div style="overflow-x:auto;">
      <table class="events-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Time</th>
            <th>Machine</th>
            <th>Line</th>
            <th>Temperature</th>
            <th>Status</th>
            <th>Type</th>
            <th>Threshold</th>
          </tr>
        </thead>
        <tbody id="events-tbody">
          <tr><td colspan="8" class="empty">Loading events...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const loadEvents = async () => {
  const line   = document.getElementById('filter-line').value;
  const limit  = document.getElementById('filter-limit').value;
  const status = document.getElementById('filter-status').value;

  let url = `backend/get_events.php?action=events&limit=${limit}`;
  if (line) url += `&line=${line}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();
    const tbody = document.getElementById('events-tbody');
    const badge = document.getElementById('table-badge');

    let events = data.events || [];
    if (status) events = events.filter(e => e.status === status);

    document.getElementById('event-count').textContent = `${events.length} events found`;
    badge.textContent = `${events.length} RECORDS`;

    if (events.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">No events found</td></tr>';
      return;
    }

    tbody.innerHTML = events.map(e => {
      const statusCls = e.status;
      const time = new Date(e.created_at).toLocaleString();
      return `
        <tr>
          <td>${e.id}</td>
          <td style="font-family:'DM Mono',monospace; font-size:0.75rem;">${time}</td>
          <td style="font-weight:600;">${e.machine_name}</td>
          <td><span class="line-tag ${e.line}">${e.line}</span></td>
          <td style="font-family:'DM Mono',monospace; font-weight:600;">${parseFloat(e.sensor_value).toFixed(1)}°C</td>
          <td><span class="event-status ${statusCls}">${e.status}</span></td>
          <td style="color:var(--text2); font-size:0.78rem;">${e.event_type}</td>
          <td style="font-family:'DM Mono',monospace; color:var(--dim);">${e.threshold_max}°C</td>
        </tr>`;
    }).join('');

  } catch(e) {
    document.getElementById('events-tbody').innerHTML =
      '<tr><td colspan="8" class="empty" style="color:var(--critical)">Failed to load events</td></tr>';
  }
};

loadEvents();
</script>
</body>
</html>
